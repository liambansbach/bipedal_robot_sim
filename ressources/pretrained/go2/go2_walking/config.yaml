train_cfg:
  actor:
    activation: elu
    class_name: MLPModel
    distribution_cfg:
      init_std: 0.8
      std_type: scalar
    hidden_dims:
    - 512
    - 256
    - 128
    obs_normalization: true
  algorithm:
    class_name: PPO
    clip_param: 0.2
    desired_kl: 0.01
    entropy_coef: 0.01
    gamma: 0.99
    lam: 0.95
    learning_rate: 0.0005
    max_grad_norm: 1.0
    normalize_advantage_per_mini_batch: false
    num_learning_epochs: 5
    num_mini_batches: 8
    rnd_cfg: null
    schedule: adaptive
    share_cnn_encoders: false
    symmetry_cfg: null
    use_clipped_value_loss: true
    value_loss_coef: 1.0
  critic:
    activation: elu
    class_name: MLPModel
    hidden_dims:
    - 512
    - 256
    - 128
    obs_normalization: true
  init_member_classes: {}
  runner:
    checkpoint: -1
    experiment_name: smoke_test
    load_run: -1
    log_wandb: true
    logger: wandb
    max_iterations: 3
    num_steps_per_env: 48
    obs_groups:
      actor:
      - policy
      critic:
      - policy
    resume: false
    resume_path: null
    run_name: ''
    save_interval: 50
    wandb_project: dodo-birdlike-gait
  runner_class_name: OnPolicyRunner
  seed: 1
  to_dict: {}
