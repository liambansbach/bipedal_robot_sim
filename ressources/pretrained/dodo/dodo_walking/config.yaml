    activation: elu
    class_name: MLPModel
    distribution_cfg:
      init_std: 0.7
      std_type: scalar
    hidden_dims:
    - 512
    - 256
    - 128
    obs_normalization: true
  algorithm:
    class_name: PPO
    clip_param: 0.2
    desired_kl: 0.01
    entropy_coef: 0.008
    gamma: 0.99
    lam: 0.95
    learning_rate: 0.0005
    max_grad_norm: 1.0
