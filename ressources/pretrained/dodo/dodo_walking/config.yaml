    share_cnn_encoders: false
    symmetry_cfg: null
    use_clipped_value_loss: true
    value_loss_coef: 1.0
  critic:
    activation: elu
    class_name: MLPModel
    hidden_dims:
    - 512
    - 256
    - 128
    obs_normalization: true
  init_member_classes: {}
  runner:
    checkpoint: -1
    experiment_name: dodo_walking
    load_run: -1
    log_wandb: true
    logger: wandb
    max_iterations: 1500
    num_steps_per_env: 48
